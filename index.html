<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello World!</title>
  <style>
    body {
      margin:0; height:100vh; background:#000; overflow:hidden;
      display:grid; place-items:center;
    }
    .stars {
      position:absolute; inset:0; pointer-events:none;
    }
    .star {
      position:absolute; background:#fff; border-radius:50%;
      box-shadow:0 0 8px #fff, 0 0 15px #7dd3fc;
      animation: warp 1.2s linear infinite;
      opacity:0.9;
    }
    @keyframes warp {
      0% { transform: translate(0,0) scale(0.1); opacity:0; }
      10% { opacity:1; }
      90% { opacity:1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(1.5); opacity:0; }
    }

    h1 {
      font-size:9vw; color:transparent;
      background:linear-gradient(90deg,#a78bfa,#7dd3fc,#f472b6,#a78bfa);
      -webkit-background-clip:text; background-clip:text;
      text-shadow:0 0 50px #4b0082, 0 0 100px #7c3aed;
      animation:bounce 2s infinite, hue 7s linear infinite;
      z-index:10; user-select:none;
    }
    @keyframes bounce {
      0%,100%{transform:translateY(0) scale(1);}
      50%    {transform:translateY(-50px) scale(1.12);}
    }
    @keyframes hue { to {filter:hue-rotate(360deg)} }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>
  <h1>Hello World!</h1>

  <script>
    const starsContainer = document.getElementById('stars');
    function createStar() {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random()*3 + 1;
      s.style.width = s.style.height = size + 'px';
      s.style.left = Math.random()*100 + 'vw';
      s.style.top  = Math.random()*100 + 'vh';
      const angle = Math.random()*Math.PI*2;
      const dist = 80 + Math.random()*120;
      s.style.setProperty('--dx', Math.cos(angle)*dist + 'vw');
      s.style.setProperty('--dy', Math.sin(angle)*dist + 'vh');
      s.style.animationDuration = (0.6 + Math.random()*0.8) + 's';
      s.style.animationDelay = Math.random()*2 + 's';
      starsContainer.appendChild(s);
      setTimeout(()=>s.remove(), 3000);
    }
    setInterval(createStar, 40);
  </script>
</body>
</html>
